<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Production Planner 2026 (Graphic Team)</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Fusemxd/task.fuse.hyg/37e17d0f0f712995e6e21546cba558911aecb74a/3.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map for React & Firebase -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', 'Anuphan', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark-glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slideUp { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, where, Timestamp } from 'firebase/firestore';
        import { 
            LayoutDashboard, ListTodo, Plus, Search, Filter, Calendar, 
            Settings, UserCircle, LogOut, CheckCircle2, Clock, 
            AlertCircle, ChevronRight, X, Image as ImageIcon,
            Save, Trash2, Camera, QrCode, Phone, Languages, User
        } from 'lucide-react';

        // --- Firebase Config & Setup ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'prod-planner-2026';

        // --- Helper: Convert File to Base64 ---
        const fileToBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = (error) => reject(error);
            });
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard'); // dashboard, tasks, graphic-info
            const [graphicData, setGraphicData] = useState([]);
            const [isAddModalOpen, setAddModalOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [actionLoading, setActionLoading] = useState(false);

            // Auth Effect
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Data Fetching Effect (Graphic Info)
            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'graphic_identities');
                const unsubscribe = onSnapshot(q, 
                    (snapshot) => {
                        const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setGraphicData(items);
                    },
                    (error) => console.error("Firestore error:", error)
                );
                return () => unsubscribe();
            }, [user]);

            const handleSaveGraphicInfo = async (data) => {
                if (!user) return;
                setActionLoading(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'graphic_identities'), {
                        ...data,
                        createdAt: Timestamp.now(),
                        createdBy: user.uid
                    });
                    setAddModalOpen(false);
                } catch (error) {
                    console.error("Save error:", error);
                } finally {
                    setActionLoading(false);
                }
            };

            const handleDeleteInfo = async (id) => {
                if (!confirm("Are you sure you want to delete this profile?")) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'graphic_identities', id));
                } catch (error) {
                    console.error("Delete error:", error);
                }
            };

            if (loading) return (
                <div className="flex items-center justify-center h-screen bg-slate-50">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="pb-24 lg:pb-0 lg:pl-64 min-h-screen">
                    {/* Desktop Sidebar */}
                    <aside className="fixed left-0 top-0 h-full w-64 bg-slate-900 text-white hidden lg:flex flex-col p-6 z-50">
                        <div className="flex items-center gap-3 mb-10 px-2">
                            <div className="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <LayoutDashboard size={24} />
                            </div>
                            <h1 className="font-bold text-xl tracking-tight">Production</h1>
                        </div>
                        
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <LayoutDashboard size={20} /> Dashboard
                            </button>
                            <button onClick={() => setView('tasks')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'tasks' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <ListTodo size={20} /> Project Tasks
                            </button>
                            <button onClick={() => setView('graphic-info')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'graphic-info' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <UserCircle size={20} /> Graphic Info
                            </button>
                        </nav>

                        <div className="pt-6 border-t border-slate-800">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold uppercase">
                                    {user?.isAnonymous ? 'G' : 'U'}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-semibold truncate">{user?.isAnonymous ? 'Guest User' : user.uid}</p>
                                    <p className="text-[10px] text-slate-500">ID: {user?.uid.slice(0, 8)}</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Mobile Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex lg:hidden items-center justify-around px-4 z-50">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center gap-1 ${view === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <LayoutDashboard size={24} /> <span className="text-[10px] font-medium">Dashboard</span>
                        </button>
                        <button onClick={() => setView('tasks')} className={`flex flex-col items-center gap-1 ${view === 'tasks' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <ListTodo size={24} /> <span className="text-[10px] font-medium">Tasks</span>
                        </button>
                        <button onClick={() => setView('graphic-info')} className={`flex flex-col items-center gap-1 ${view === 'graphic-info' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <UserCircle size={24} /> <span className="text-[10px] font-medium">Identity</span>
                        </button>
                    </nav>

                    {/* Main Content */}
                    <main className="p-4 md:p-8 lg:p-12 max-w-7xl mx-auto">
                        {view === 'graphic-info' ? (
                            <GraphicInfoView 
                                items={graphicData} 
                                onAdd={() => setAddModalOpen(true)}
                                onDelete={handleDeleteInfo}
                            />
                        ) : (
                            <div className="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                                <p className="text-slate-400">Main Dashboard & Task System Placeholder</p>
                                <button onClick={() => setView('graphic-info')} className="mt-4 px-6 py-3 bg-indigo-600 text-white rounded-xl">Go to Graphic Info</button>
                            </div>
                        )}
                    </main>

                    {/* Modal สำหรับเพิ่ม Graphic Info */}
                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden animate-slideUp">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="text-xl font-bold">New Graphic Identity</h2>
                                    <button onClick={() => setAddModalOpen(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                                        <X size={20} />
                                    </button>
                                </div>
                                <div className="p-6 max-h-[80vh] overflow-y-auto custom-scrollbar">
                                    <GraphicInfoForm onSave={handleSaveGraphicInfo} isLoading={actionLoading} onCancel={() => setAddModalOpen(false)} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const GraphicInfoView = ({ items, onAdd, onDelete }) => {
            return (
                <div className="space-y-8">
                    <header className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                        <div>
                            <h2 className="text-3xl font-extrabold tracking-tight text-slate-900">Graphic Info</h2>
                            <p className="text-slate-500 mt-1">Identities & Info for design team assets</p>
                        </div>
                        <button 
                            onClick={onAdd}
                            className="flex items-center justify-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-lg shadow-indigo-600/20 hover:scale-[1.02] active:scale-[0.98] transition-all font-semibold"
                        >
                            <Plus size={20} /> Add Identity
                        </button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        {items.length === 0 ? (
                            <div className="col-span-full py-20 text-center bg-white rounded-3xl border border-dashed border-slate-300">
                                <UserCircle size={48} className="mx-auto text-slate-300 mb-4" />
                                <p className="text-slate-500 font-medium">No identities saved yet.</p>
                                <button onClick={onAdd} className="text-indigo-600 text-sm font-semibold mt-2 hover:underline">Add the first one</button>
                            </div>
                        ) : (
                            items.map(item => (
                                <div key={item.id} className="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm hover:shadow-md transition-shadow group relative">
                                    <button 
                                        onClick={() => onDelete(item.id)}
                                        className="absolute top-4 right-4 p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-all"
                                    >
                                        <Trash2 size={16} />
                                    </button>
                                    
                                    <div className="flex gap-4 mb-6">
                                        <div className="w-20 h-20 rounded-2xl bg-slate-50 overflow-hidden flex-shrink-0 border border-slate-100">
                                            {item.photo ? (
                                                <img src={item.photo} className="w-full h-full object-cover" alt="Profile" />
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center text-slate-300"><User size={32} /></div>
                                            )}
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg text-slate-900 leading-tight">{item.nameTh}</h3>
                                            <p className="text-slate-400 text-sm mb-1">{item.nameEn}</p>
                                            <span className="inline-block px-2 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase rounded-md">
                                                {item.posEn || 'STAFF'}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="space-y-3 pt-4 border-t border-slate-50">
                                        <div className="flex items-center gap-3 text-sm">
                                            <div className="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center text-slate-400">
                                                <Languages size={14} />
                                            </div>
                                            <span className="text-slate-600 font-medium">{item.posTh}</span>
                                        </div>
                                        <div className="flex items-center gap-3 text-sm">
                                            <div className="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center text-slate-400">
                                                <Phone size={14} />
                                            </div>
                                            <span className="text-slate-600 font-medium font-mono">{item.phone}</span>
                                        </div>
                                    </div>

                                    <div className="mt-6 flex items-center justify-between">
                                        <div className="flex flex-col">
                                            <span className="text-[10px] text-slate-400 font-bold uppercase">QR Line</span>
                                            <div className="w-12 h-12 mt-1 rounded-lg bg-emerald-50 border border-emerald-100 flex items-center justify-center overflow-hidden">
                                                {item.qrLine ? (
                                                    <img src={item.qrLine} className="w-full h-full object-cover" alt="QR" />
                                                ) : (
                                                    <QrCode size={20} className="text-emerald-500" />
                                                )}
                                            </div>
                                        </div>
                                        <button className="px-4 py-2 text-xs font-bold text-indigo-600 bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-colors">
                                            Copy for Designer
                                        </button>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const GraphicInfoForm = ({ onSave, isLoading, onCancel }) => {
            const [formData, setFormData] = useState({
                nameTh: '', nameEn: '',
                posTh: '', posEn: '',
                phone: '',
                photo: null,
                qrLine: null
            });

            const handleFileChange = async (e, field) => {
                const file = e.target.files[0];
                if (file) {
                    try {
                        const base64 = await fileToBase64(file);
                        setFormData(prev => ({ ...prev, [field]: base64 }));
                    } catch (err) {
                        console.error("File error:", err);
                    }
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.nameTh || !formData.phone) {
                    alert("กรุณากรอกชื่อไทยและเบอร์โทรศัพท์");
                    return;
                }
                onSave(formData);
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1">ชื่อ (ภาษาไทย)</label>
                            <input 
                                type="text" value={formData.nameTh} onChange={e => setFormData(p => ({...p, nameTh: e.target.value}))}
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="เช่น นายพัทธดนย์..."
                            />
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1">Name (English)</label>
                            <input 
                                type="text" value={formData.nameEn} onChange={e => setFormData(p => ({...p, nameEn: e.target.value}))}
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="e.g. John Doe"
                            />
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-slate-500 uppercase">ตำแหน่ง (ภาษาไทย)</label>
                            <input 
                                type="text" value={formData.posTh} onChange={e => setFormData(p => ({...p, posTh: e.target.value}))}
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="เช่น กราฟิกดีไซน์เนอร์"
                            />
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-slate-500 uppercase">Position (English)</label>
                            <input 
                                type="text" value={formData.posEn} onChange={e => setFormData(p => ({...p, posEn: e.target.value}))}
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="e.g. Art Director"
                            />
                        </div>
                        <div className="col-span-full space-y-2">
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1"><Phone size={12}/> เบอร์โทรศัพท์</label>
                            <input 
                                type="tel" value={formData.phone} onChange={e => setFormData(p => ({...p, phone: e.target.value}))}
                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="08X-XXXXXXX"
                            />
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100">
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1"><Camera size={12}/> รูปถ่ายส่วนตัว</label>
                            <div 
                                onClick={() => document.getElementById('photo-up').click()}
                                className="h-32 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-50 hover:border-indigo-200 transition-all relative overflow-hidden"
                            >
                                {formData.photo ? (
                                    <img src={formData.photo} className="w-full h-full object-cover" />
                                ) : (
                                    <>
                                        <ImageIcon className="text-slate-300 mb-2" size={24} />
                                        <span className="text-[10px] text-slate-400 font-medium">Click to upload</span>
                                    </>
                                )}
                                <input id="photo-up" type="file" accept="image/*" onChange={e => handleFileChange(e, 'photo')} className="hidden" />
                            </div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1"><QrCode size={12}/> QR Code Line</label>
                            <div 
                                onClick={() => document.getElementById('qr-up').click()}
                                className="h-32 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-emerald-50 hover:border-emerald-200 transition-all relative overflow-hidden"
                            >
                                {formData.qrLine ? (
                                    <img src={formData.qrLine} className="w-full h-full object-cover" />
                                ) : (
                                    <>
                                        <QrCode className="text-slate-300 mb-2" size={24} />
                                        <span className="text-[10px] text-slate-400 font-medium">Click to upload</span>
                                    </>
                                )}
                                <input id="qr-up" type="file" accept="image/*" onChange={e => handleFileChange(e, 'qrLine')} className="hidden" />
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-3 pt-6">
                        <button 
                            type="button" onClick={onCancel}
                            className="flex-1 px-6 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200 transition-all"
                        >
                            Cancel
                        </button>
                        <button 
                            type="submit" disabled={isLoading}
                            className="flex-[2] px-6 py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-600/20 disabled:opacity-50 flex items-center justify-center gap-2 transition-all"
                        >
                            {isLoading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <><Save size={20}/> Save Identity</>}
                        </button>
                    </div>
                </form>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
