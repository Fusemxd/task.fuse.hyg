<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Production Planner 2026 (Full Hub)</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Fusemxd/task.fuse.hyg/37e17d0f0f712995e6e21546cba558911aecb74a/3.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map for React & Firebase Modules -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap');
        
        :root {
            --font-main: 'Plus Jakarta Sans', 'Anuphan', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .copy-success-anim {
            animation: fadeInOut 2s ease-in-out forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Fix: Add data-type="module" to enable ESM with Babel Standalone -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { 
            getFirestore, collection, addDoc, onSnapshot, 
            query, orderBy, deleteDoc, doc, updateDoc, setDoc
        } from 'firebase/firestore';
        import { 
            LayoutGrid, Plus, Copy, Image as ImageIcon, 
            QrCode, Phone, User, Trash2, CheckCircle, ExternalLink,
            FileText, Palette, Check, Calendar, Settings, LogOut,
            Briefcase, Clock, ChevronRight, AlertCircle, Search
        } from 'lucide-react';

        // --- Firebase Config & Init ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'production-planner-2026';

        // --- Shared Components ---
        const Toast = ({ message, type = 'success' }) => (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] copy-success-anim">
                <div className={`px-4 py-2 rounded-full shadow-lg text-white font-medium flex items-center gap-2 ${
                    type === 'success' ? 'bg-emerald-500' : 'bg-red-500'
                }`}>
                    {type === 'success' ? <Check size={18}/> : <AlertCircle size={18}/>}
                    {message}
                </div>
            </div>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('production'); // 'overview', 'production', 'design'
            const [toast, setToast] = useState(null);
            const [isDesignModalOpen, setIsDesignModalOpen] = useState(false);
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            
            // Data States
            const [tasks, setTasks] = useState([]);
            const [designRequests, setDesignRequests] = useState([]);
            const [loading, setLoading] = useState(false);

            // Form States for Design
            const [designForm, setDesignForm] = useState({
                nameTH: '', nameEN: '',
                positionTH: '', positionEN: '',
                phone: '',
                personalImg: null,
                qrCodeImg: null
            });

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2500);
            };

            // Auth Effect
            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                const unsubAuth = onAuthStateChanged(auth, setUser);
                return () => unsubAuth();
            }, []);

            // Data Listeners
            useEffect(() => {
                if (!user) return;

                // Listen to Tasks (Production)
                const qTasks = query(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), orderBy('createdAt', 'desc'));
                const unsubTasks = onSnapshot(qTasks, (snap) => {
                    setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // Listen to Design Requests
                const qDesign = query(collection(db, 'artifacts', appId, 'public', 'data', 'design_requests'), orderBy('createdAt', 'desc'));
                const unsubDesign = onSnapshot(qDesign, (snap) => {
                    setDesignRequests(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubTasks(); unsubDesign(); };
            }, [user]);

            // Handlers
            const handleFileChange = (e, field) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setDesignForm(prev => ({ ...prev, [field]: reader.result }));
                    reader.readAsDataURL(file);
                }
            };

            const saveDesign = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'design_requests'), {
                        ...designForm,
                        createdAt: Date.now()
                    });
                    setDesignForm({ nameTH: '', nameEN: '', positionTH: '', positionEN: '', phone: '', personalImg: null, qrCodeImg: null });
                    setIsDesignModalOpen(false);
                    showToast("บันทึกข้อมูลออกแบบสำเร็จ");
                } catch (err) {
                    showToast("บันทึกไม่สำเร็จ");
                } finally {
                    setLoading(false);
                }
            };

            const deleteDesign = async (id) => {
                if (!confirm("ลบข้อมูลออกแบบนี้?")) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'design_requests', id));
                    showToast("ลบข้อมูลแล้ว");
                } catch (err) { showToast("ลบไม่สำเร็จ"); }
            };

            const copyToClipboard = (text, label) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast(`คัดลอก ${label} แล้ว`);
            };

            return (
                <div className="min-h-screen pb-20">
                    {toast && <Toast message={toast} />}

                    {/* Navigation Bar */}
                    <nav className="sticky top-0 z-50 glass-morphism border-b border-slate-200">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center">
                                    <Palette className="text-white" size={18} />
                                </div>
                                <span className="font-bold text-slate-800">Production Hub</span>
                            </div>
                            <div className="flex gap-2">
                                <button 
                                    onClick={() => setActiveTab('production')}
                                    className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'production' ? 'bg-emerald-100 text-emerald-700' : 'text-slate-500'}`}
                                >งานผลิต</button>
                                <button 
                                    onClick={() => setActiveTab('design')}
                                    className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'design' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500'}`}
                                >ข้อมูลออกแบบ</button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {/* Header */}
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900">
                                    {activeTab === 'production' ? 'รายการงานผลิต' : 'คลังข้อมูลงานออกแบบ'}
                                </h1>
                                <p className="text-slate-500 text-sm">
                                    {activeTab === 'production' ? 'ติดตามสถานะการผลิตประจำวัน' : 'ข้อมูลพนักงานสำหรับทำนามบัตร (ทีมกราฟิก)'}
                                </p>
                            </div>
                            {activeTab === 'design' && (
                                <button 
                                    onClick={() => setIsDesignModalOpen(true)}
                                    className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-semibold shadow-lg shadow-indigo-200 flex items-center gap-2 hover:bg-indigo-700 active:scale-95 transition-all"
                                >
                                    <Plus size={18}/> บันทึกข้อมูลใหม่
                                </button>
                            )}
                        </div>

                        {/* Production View */}
                        {activeTab === 'production' && (
                            <div className="bg-white rounded-2xl border border-slate-200 p-8 text-center">
                                <Clock size={48} className="mx-auto text-slate-300 mb-4" />
                                <p className="text-slate-400 font-medium">ส่วนงานผลิตเดิม (Production Logic)</p>
                                <p className="text-xs text-slate-300 mt-2">กำลังเชื่อมต่อฐานข้อมูลงานผลิต...</p>
                            </div>
                        )}

                        {/* Design Hub View (For Graphic Team) */}
                        {activeTab === 'design' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {designRequests.length === 0 ? (
                                    <div className="col-span-full py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200 text-center">
                                        <Palette size={48} className="mx-auto text-slate-300 mb-4" />
                                        <p className="text-slate-400 font-medium">ยังไม่มีข้อมูลงานออกแบบ</p>
                                    </div>
                                ) : (
                                    designRequests.map((item) => (
                                        <div key={item.id} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow">
                                            <div className="p-6">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center">
                                                            <User size={24} />
                                                        </div>
                                                        <div>
                                                            <h3 className="font-bold text-lg text-slate-800 leading-tight">คุณ {item.nameTH}</h3>
                                                            <p className="text-xs text-slate-400">สั่งเมื่อ {new Date(item.createdAt).toLocaleDateString('th-TH')}</p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => deleteDesign(item.id)} className="p-2 text-slate-300 hover:text-red-500 transition-colors">
                                                        <Trash2 size={18} />
                                                    </button>
                                                </div>

                                                <div className="space-y-3 mb-6">
                                                    <CopyItem label="ชื่อ (TH)" value={item.nameTH} onCopy={() => copyToClipboard(item.nameTH, "ชื่อไทย")} />
                                                    <CopyItem label="ชื่อ (EN)" value={item.nameEN} onCopy={() => copyToClipboard(item.nameEN, "ชื่ออังกฤษ")} />
                                                    <CopyItem label="ตำแหน่ง (TH)" value={item.positionTH} onCopy={() => copyToClipboard(item.positionTH, "ตำแหน่งไทย")} />
                                                    <CopyItem label="ตำแหน่ง (EN)" value={item.positionEN} onCopy={() => copyToClipboard(item.positionEN, "ตำแหน่งอังกฤษ")} />
                                                    <CopyItem label="เบอร์โทร" value={item.phone} onCopy={() => copyToClipboard(item.phone, "เบอร์โทร")} icon={<Phone size={14}/>} />
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="group relative bg-slate-50 rounded-2xl p-3 flex flex-col items-center justify-center text-center overflow-hidden h-36">
                                                        {item.personalImg ? (
                                                            <img src={item.personalImg} className="w-full h-full object-cover rounded-lg" />
                                                        ) : <ImageIcon className="text-slate-200" size={32}/>}
                                                        <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                                                            <span className="text-white text-[10px] font-bold">รูปส่วนตัว</span>
                                                            <ExternalLink className="text-white" size={16}/>
                                                        </div>
                                                    </div>
                                                    <div className="group relative bg-slate-50 rounded-2xl p-3 flex flex-col items-center justify-center text-center overflow-hidden h-36">
                                                        {item.qrCodeImg ? (
                                                            <img src={item.qrCodeImg} className="w-full h-full object-contain rounded-lg" />
                                                        ) : <QrCode className="text-slate-200" size={32}/>}
                                                        <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                                                            <span className="text-white text-[10px] font-bold">QR LINE</span>
                                                            <ExternalLink className="text-white" size={16}/>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    {/* Design Modal */}
                    {isDesignModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => !loading && setIsDesignModalOpen(false)}></div>
                            <div className="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl relative z-10 overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0">
                                    <h2 className="text-xl font-bold">เพิ่มข้อมูลออกแบบ</h2>
                                    <button onClick={() => setIsDesignModalOpen(false)} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100">
                                        <Plus className="rotate-45 text-slate-400" size={24} />
                                    </button>
                                </div>
                                <form onSubmit={saveDesign} className="p-6 overflow-y-auto space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <InputField label="ชื่อ-สกุล (ไทย)" value={designForm.nameTH} onChange={v => setDesignForm({...designForm, nameTH: v})} />
                                        <InputField label="Full Name (EN)" value={designForm.nameEN} onChange={v => setDesignForm({...designForm, nameEN: v})} />
                                        <InputField label="ตำแหน่ง (ไทย)" value={designForm.positionTH} onChange={v => setDesignForm({...designForm, positionTH: v})} />
                                        <InputField label="Position (EN)" value={designForm.positionEN} onChange={v => setDesignForm({...designForm, positionEN: v})} />
                                        <div className="col-span-2">
                                            <InputField label="เบอร์โทรศัพท์" value={designForm.phone} onChange={v => setDesignForm({...designForm, phone: v})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-slate-400 ml-1">รูปส่วนตัว</label>
                                            <ImageUploader value={designForm.personalImg} onChange={e => handleFileChange(e, 'personalImg')} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-slate-400 ml-1">QR Code Line</label>
                                            <ImageUploader value={designForm.qrCodeImg} onChange={e => handleFileChange(e, 'qrCodeImg')} />
                                        </div>
                                    </div>
                                    <button 
                                        disabled={loading}
                                        className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all disabled:opacity-50"
                                    >
                                        {loading ? "กำลังบันทึก..." : "บันทึกข้อมูล"}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CopyItem = ({ label, value, onCopy, icon }) => (
            <div className="group bg-slate-50 hover:bg-indigo-50 rounded-xl p-3 flex items-center justify-between transition-colors">
                <div className="flex items-center gap-3 overflow-hidden">
                    <div className="text-slate-400 group-hover:text-indigo-500">{icon || <div className="w-1.5 h-1.5 rounded-full bg-current opacity-30"/>}</div>
                    <div className="overflow-hidden">
                        <p className="text-[9px] font-bold text-slate-400 uppercase mb-0.5">{label}</p>
                        <p className="text-sm font-semibold text-slate-700 truncate">{value || '-'}</p>
                    </div>
                </div>
                <button onClick={onCopy} className="p-2 bg-white text-slate-400 hover:text-indigo-600 rounded-lg shadow-sm">
                    <Copy size={14} />
                </button>
            </div>
        );

        const InputField = ({ label, value, onChange, placeholder }) => (
            <div>
                <label className="block text-xs font-bold text-slate-400 mb-1.5 ml-1">{label}</label>
                <input 
                    required 
                    type="text" 
                    value={value} 
                    onChange={e => onChange(e.target.value)}
                    className="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" 
                    placeholder={placeholder}
                />
            </div>
        );

        const ImageUploader = ({ value, onChange }) => (
            <div className="relative h-32 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50 flex flex-col items-center justify-center overflow-hidden hover:border-indigo-300 transition-colors">
                {value ? (
                    <img src={value} className="w-full h-full object-cover" />
                ) : (
                    <div className="flex flex-col items-center text-slate-300">
                        <ImageIcon size={24} />
                        <span className="text-[10px] font-bold mt-1">SELECT</span>
                    </div>
                )}
                <input type="file" accept="image/*" onChange={onChange} className="absolute inset-0 opacity-0 cursor-pointer" />
            </div>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
