<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Production Planner 2026</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Fusemxd/task.fuse.hyg/37e17d0f0f712995e6e21546cba558911aecb74a/3.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map for React & Firebase -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Anuphan', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slideUp { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, Timestamp } from 'firebase/firestore';
        import { 
            LayoutDashboard, ListTodo, Plus, UserCircle, X, 
            Save, Trash2, Camera, QrCode, Phone, Languages, User,
            Copy, Check, FileText
        } from 'lucide-react';

        // --- Firebase Setup ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'prod-planner-2026';

        // --- Helpers ---
        const fileToBase64 = (file) => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
            reader.onerror = rej;
        });

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('graphic-info'); // Default to new view
            const [graphicData, setGraphicData] = useState([]);
            const [isModalOpen, setModalOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [actionLoading, setActionLoading] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'graphic_identities');
                return onSnapshot(q, (snap) => {
                    setGraphicData(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            const handleSave = async (data) => {
                setActionLoading(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'graphic_identities'), {
                        ...data, createdAt: Timestamp.now(), uid: user.uid
                    });
                    setModalOpen(false);
                } catch (e) { console.error(e); }
                setActionLoading(false);
            };

            const handleDelete = async (id) => {
                if (confirm("Delete this entry?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'graphic_identities', id));
            };

            if (loading) return <div className="h-screen flex items-center justify-center"><div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen flex flex-col lg:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full lg:w-64 bg-slate-900 text-white p-6 flex flex-col">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center"><LayoutDashboard size={20}/></div>
                            <h1 className="font-bold text-lg">Planner 2026</h1>
                        </div>
                        <nav className="flex-1 space-y-1">
                            <NavItem active={view === 'tasks'} onClick={() => setView('tasks')} icon={<ListTodo size={20}/>} label="Tasks" />
                            <NavItem active={view === 'graphic-info'} onClick={() => setView('graphic-info')} icon={<UserCircle size={20}/>} label="Graphic Info" />
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-4 md:p-10 bg-[#f8fafc] overflow-x-hidden">
                        {view === 'graphic-info' ? (
                            <div className="max-w-6xl mx-auto space-y-6">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <h2 className="text-2xl font-bold text-slate-800">Graphic Info Storage</h2>
                                        <p className="text-sm text-slate-500">เก็บข้อมูลเพื่อนำไปใช้ในงานออกแบบ</p>
                                    </div>
                                    <button onClick={() => setModalOpen(true)} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                                        <Plus size={20}/> Add Info
                                    </button>
                                </div>

                                {/* Table View (No Cards) */}
                                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-slideUp">
                                    <div className="overflow-x-auto custom-scrollbar">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Profile</th>
                                                    <th className="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Position (TH/EN)</th>
                                                    <th className="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Contact</th>
                                                    <th className="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider text-center">QR Line</th>
                                                    <th className="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider text-right">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {graphicData.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="5" className="px-6 py-12 text-center text-slate-400">No data stored yet.</td>
                                                    </tr>
                                                ) : graphicData.map(item => (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="px-6 py-4">
                                                            <div className="flex items-center gap-3">
                                                                <div className="w-10 h-10 rounded-full bg-slate-100 overflow-hidden border border-slate-200 flex-shrink-0">
                                                                    {item.photo ? <img src={item.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-300"><User size={20}/></div>}
                                                                </div>
                                                                <div>
                                                                    <div className="font-bold text-slate-800 text-sm">{item.nameTh}</div>
                                                                    <div className="text-xs text-slate-400">{item.nameEn}</div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <div className="text-sm text-slate-600 font-medium">{item.posTh}</div>
                                                            <div className="text-[11px] text-slate-400 italic">{item.posEn}</div>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <div className="flex items-center gap-2 text-sm text-slate-600 font-mono">
                                                                <Phone size={14} className="text-slate-300"/> {item.phone}
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <div className="flex justify-center">
                                                                <div className="w-10 h-10 border border-slate-200 rounded p-0.5 bg-white">
                                                                    {item.qrLine ? <img src={item.qrLine} className="w-full h-full object-contain" /> : <QrCode size={16} className="text-slate-200 m-auto mt-2"/>}
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-4 text-right">
                                                            <div className="flex justify-end gap-2">
                                                                <CopyButton data={item} />
                                                                <button onClick={() => handleDelete(item.id)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                                                                    <Trash2 size={18}/>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="h-64 flex flex-col items-center justify-center text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200">
                                <ListTodo size={40} className="mb-2 opacity-20"/>
                                <p>Task View Placeholder</p>
                                <button onClick={() => setView('graphic-info')} className="mt-4 text-indigo-600 font-bold hover:underline">Go to Graphic Info</button>
                            </div>
                        )}
                    </main>

                    {/* Modal Form */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[32px] w-full max-w-xl shadow-2xl overflow-hidden animate-slideUp">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="text-xl font-bold">New Identity Info</h3>
                                    <button onClick={() => setModalOpen(false)} className="p-2 hover:bg-slate-50 rounded-full"><X size={20}/></button>
                                </div>
                                <div className="p-8 max-h-[85vh] overflow-y-auto custom-scrollbar">
                                    <GraphicForm onSave={handleSave} onCancel={() => setModalOpen(false)} loading={actionLoading} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const NavItem = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${active ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                {icon} <span className="font-semibold text-sm">{label}</span>
            </button>
        );

        const CopyButton = ({ data }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = () => {
                const text = `Name: ${data.nameTh} (${data.nameEn})\nPosition: ${data.posTh} (${data.posEn})\nPhone: ${data.phone}`;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button onClick={handleCopy} className={`p-2 rounded-lg transition-all ${copied ? 'text-emerald-500 bg-emerald-50' : 'text-slate-300 hover:text-indigo-600 hover:bg-indigo-50'}`}>
                    {copied ? <Check size={18}/> : <Copy size={18}/>}
                </button>
            );
        };

        const GraphicForm = ({ onSave, onCancel, loading }) => {
            const [form, setForm] = useState({ nameTh: '', nameEn: '', posTh: '', posEn: '', phone: '', photo: null, qrLine: null });

            const handleFile = async (e, field) => {
                const file = e.target.files[0];
                if (file) setForm(p => ({ ...p, [field]: null })); // reset
                const base64 = await fileToBase64(file);
                setForm(p => ({ ...p, [field]: base64 }));
            };

            return (
                <form onSubmit={e => { e.preventDefault(); onSave(form); }} className="space-y-5">
                    <div className="grid grid-cols-2 gap-4">
                        <Input label="ชื่อ (TH)" value={form.nameTh} onChange={v => setForm(p => ({...p, nameTh: v}))} placeholder="นายสมชาย..." required />
                        <Input label="Name (EN)" value={form.nameEn} onChange={v => setForm(p => ({...p, nameEn: v}))} placeholder="Somchai..." />
                        <Input label="ตำแหน่ง (TH)" value={form.posTh} onChange={v => setForm(p => ({...p, posTh: v}))} placeholder="กราฟิก..." />
                        <Input label="Position (EN)" value={form.posEn} onChange={v => setForm(p => ({...p, posEn: v}))} placeholder="Graphic..." />
                    </div>
                    <Input label="เบอร์โทรศัพท์" value={form.phone} onChange={v => setForm(p => ({...p, phone: v}))} placeholder="08XXXXXXXX" required />
                    
                    <div className="grid grid-cols-2 gap-4">
                        <FileSelect label="Personal Photo" icon={<Camera size={20}/>} value={form.photo} onChange={e => handleFile(e, 'photo')} />
                        <FileSelect label="QR Line" icon={<QrCode size={20}/>} value={form.qrLine} onChange={e => handleFile(e, 'qrLine')} />
                    </div>

                    <div className="flex gap-3 pt-4">
                        <button type="button" onClick={onCancel} className="flex-1 py-3.5 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200">Cancel</button>
                        <button type="submit" disabled={loading} className="flex-[2] py-3.5 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg hover:bg-indigo-700 disabled:opacity-50">
                            {loading ? "Saving..." : "Save Information"}
                        </button>
                    </div>
                </form>
            );
        };

        const Input = ({ label, ...props }) => (
            <div className="space-y-1.5">
                <label className="text-[11px] font-bold text-slate-400 uppercase ml-1">{label}</label>
                <input {...props} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm" onChange={e => props.onChange(e.target.value)} />
            </div>
        );

        const FileSelect = ({ label, icon, value, onChange }) => (
            <div className="space-y-1.5">
                <label className="text-[11px] font-bold text-slate-400 uppercase ml-1">{label}</label>
                <div onClick={() => document.getElementById(label).click()} className={`h-28 border-2 border-dashed rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all overflow-hidden ${value ? 'border-indigo-200 bg-indigo-50' : 'border-slate-200 bg-slate-50 hover:border-slate-300'}`}>
                    {value ? <img src={value} className="w-full h-full object-cover" /> : <div className="text-slate-300 flex flex-col items-center gap-1">{icon}<span className="text-[10px]">Upload</span></div>}
                    <input id={label} type="file" hidden accept="image/*" onChange={onChange} />
                </div>
            </div>
        );

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
