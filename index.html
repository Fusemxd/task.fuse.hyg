<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Production Planner 2026 (Graphic Team)</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Fusemxd/task.fuse.hyg/37e17d0f0f712995e6e21546cba558911aecb74a/3.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map for React & Firebase Modules -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .task-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f1f5f9;
            background: #ffffff;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            border-color: #e2e8f0;
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .animate-slideUp {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.2s ease-out forwards;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Shimmer Loading */
        .shimmer {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 800px 100%;
            animation-duration: 1.5s;
            animation-fill-mode: forwards;
            animation-iteration-count: infinite;
            animation-name: placeholderShimmer;
            animation-timing-function: linear;
        }
        @keyframes placeholderShimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        /* Hide scrollbar for tabs but allow scroll */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getFirestore, collection, addDoc, onSnapshot, 
            updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp, writeBatch 
        } from 'firebase/firestore';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import * as Lucide from 'lucide-react';

        const { 
            Plus, Calendar, Clock, CheckCircle2, Circle, Search, Filter, 
            MoreVertical, Edit2, Trash2, X, AlertCircle, TrendingUp, 
            Users, LayoutDashboard, ListTodo, History, CheckCircle, Target,
            ChevronRight, AlertTriangle, Link as LinkIcon, Tag,
            Facebook, Instagram, Youtube, Video, Image as ImageIcon,
            Smartphone, Globe, Briefcase, FileText, ChevronDown, Lock, Unlock, LogOut, Check
        } = Lucide;

        // --- Configuration & Helpers ---
        const WORKERS = [
            { id: '1', name: 'Mink', role: 'Graphic Designer', color: 'bg-rose-100 text-rose-700 ring-rose-200' },
            { id: '2', name: 'Snail', role: 'Video Editor', color: 'bg-indigo-100 text-indigo-700 ring-indigo-200' },
            { id: '3', name: 'Nink', role: 'Content Creator', color: 'bg-emerald-100 text-emerald-700 ring-emerald-200' },
            { id: '4', name: 'Mook', role: 'UX/UI', color: 'bg-purple-100 text-purple-700 ring-purple-200' },
            { id: '5', name: 'Unassigned', role: 'TBD', color: 'bg-slate-100 text-slate-600 ring-slate-200' }
        ];

        const PLATFORMS = {
            'facebook': { icon: Facebook, color: 'text-blue-600', bg: 'bg-blue-50' },
            'instagram': { icon: Instagram, color: 'text-pink-600', bg: 'bg-pink-50' },
            'tiktok': { icon: Smartphone, color: 'text-slate-900', bg: 'bg-slate-100' },
            'youtube': { icon: Youtube, color: 'text-red-600', bg: 'bg-red-50' },
            'website': { icon: Globe, color: 'text-teal-600', bg: 'bg-teal-50' },
            'other': { icon: LayoutDashboard, color: 'text-slate-500', bg: 'bg-slate-50' }
        };

        const CONTENT_TYPES = [
            { id: 'single_image', label: 'Single Image', icon: ImageIcon },
            { id: 'album', label: 'Photo Album', icon: ImageIcon },
            { id: 'short_video', label: 'Short Video (Reels/TikTok)', icon: Video },
            { id: 'long_video', label: 'Long Video (YT/FB)', icon: Video },
            { id: 'story', label: 'Story', icon: Smartphone },
            { id: 'article', label: 'Article/Blog', icon: FileText }
        ];

        const STATUSES = {
            'todo': { label: 'To Do', color: 'bg-slate-100 text-slate-700 border-slate-200', icon: Circle },
            'in_progress': { label: 'In Progress', color: 'bg-amber-100 text-amber-800 border-amber-200', icon: Clock },
            'review': { label: 'Review', color: 'bg-blue-100 text-blue-800 border-blue-200', icon: Search },
            'done': { label: 'Done', color: 'bg-emerald-100 text-emerald-800 border-emerald-200', icon: CheckCircle2 }
        };

        const PRIORITIES = {
            'low': { label: 'Low', color: 'text-slate-500 bg-slate-100', icon: ChevronDown },
            'medium': { label: 'Medium', color: 'text-amber-500 bg-amber-50', icon: Circle },
            'high': { label: 'High', color: 'text-rose-500 bg-rose-50', icon: AlertCircle },
            'urgent': { label: 'Urgent', color: 'text-white bg-rose-500 shadow-sm shadow-rose-200', icon: AlertTriangle }
        };

        // Date Formatter
        const formatDate = (dateString) => {
            if (!dateString) return 'No date';
            const date = new Date(dateString);
            return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
        };
        
        const formatDateTime = (dateString) => {
             if (!dateString) return '';
             const date = new Date(dateString);
             return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
        }

        const isOverdue = (dateString, status) => {
            if (!dateString || status === 'done') return false;
            return new Date(dateString) < new Date(new Date().setHours(0,0,0,0));
        };

        // --- Firebase Context (Placeholder for actual config) ---
        // This will be replaced by the environment inject in actual run.
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // Fake config to prevent immediate crash if not injected, though it won't connect.
            apiKey: "fake-api-key", projectId: "fake-project", appId: "fake-app"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'production-planner-2026';

        // --- Components ---

        // 1. Dashboard Stats
        const DashboardStats = ({ tasks }) => {
            const stats = useMemo(() => {
                const total = tasks.length;
                const done = tasks.filter(t => t.status === 'done').length;
                const inProgress = tasks.filter(t => t.status === 'in_progress' || t.status === 'review').length;
                const overdue = tasks.filter(t => isOverdue(t.dueDate, t.status)).length;
                const progress = total === 0 ? 0 : Math.round((done / total) * 100);

                return { total, done, inProgress, overdue, progress };
            }, [tasks]);

            return (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div className="glass-panel p-5 rounded-2xl relative overflow-hidden group">
                        <div className="absolute -right-4 -top-4 w-16 h-16 bg-blue-500/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                        <div className="flex items-center justify-between mb-2">
                            <span className="text-slate-500 text-sm font-medium">Total Tasks</span>
                            <div className="p-2 bg-blue-50 text-blue-600 rounded-lg"><ListTodo size={18} /></div>
                        </div>
                        <div className="text-3xl font-bold text-slate-800">{stats.total}</div>
                    </div>
                    
                    <div className="glass-panel p-5 rounded-2xl relative overflow-hidden group">
                        <div className="absolute -right-4 -top-4 w-16 h-16 bg-emerald-500/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                        <div className="flex items-center justify-between mb-2">
                            <span className="text-slate-500 text-sm font-medium">Completed</span>
                            <div className="p-2 bg-emerald-50 text-emerald-600 rounded-lg"><CheckCircle size={18} /></div>
                        </div>
                        <div className="text-3xl font-bold text-slate-800">{stats.done}</div>
                        <div className="mt-2 w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                            <div className="bg-emerald-500 h-full rounded-full transition-all duration-1000" style={{ width: `${stats.progress}%` }}></div>
                        </div>
                    </div>
                    
                    <div className="glass-panel p-5 rounded-2xl relative overflow-hidden group">
                        <div className="absolute -right-4 -top-4 w-16 h-16 bg-amber-500/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                        <div className="flex items-center justify-between mb-2">
                            <span className="text-slate-500 text-sm font-medium">In Progress</span>
                            <div className="p-2 bg-amber-50 text-amber-600 rounded-lg"><Clock size={18} /></div>
                        </div>
                        <div className="text-3xl font-bold text-slate-800">{stats.inProgress}</div>
                    </div>
                    
                    <div className="glass-panel p-5 rounded-2xl relative overflow-hidden group">
                        <div className="absolute -right-4 -top-4 w-16 h-16 bg-rose-500/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
                        <div className="flex items-center justify-between mb-2">
                            <span className="text-slate-500 text-sm font-medium">Overdue</span>
                            <div className="p-2 bg-rose-50 text-rose-600 rounded-lg"><AlertCircle size={18} /></div>
                        </div>
                        <div className="text-3xl font-bold text-rose-600">{stats.overdue}</div>
                    </div>
                </div>
            );
        };

        // 2. Task Card
        const TaskCard = ({ task, onClick, onSelect, isSelected }) => {
            const worker = WORKERS.find(w => w.name === task.assignee) || WORKERS[4];
            const platform = PLATFORMS[task.platform] || PLATFORMS['other'];
            const PlatformIcon = platform.icon;
            const statusInfo = STATUSES[task.status];
            const priorityInfo = PRIORITIES[task.priority];
            const overdue = isOverdue(task.dueDate, task.status);

            return (
                <div 
                    className={`task-card p-4 rounded-2xl cursor-pointer relative group ${isSelected ? 'ring-2 ring-blue-500 bg-blue-50/30' : ''}`}
                    onClick={(e) => {
                        // Prevent opening detail modal if clicking the checkbox area
                        if(e.target.closest('.checkbox-area')) return;
                        onClick();
                    }}
                >
                    {/* Checkbox for bulk actions */}
                    <div 
                        className="checkbox-area absolute top-4 right-4 z-10 p-1"
                        onClick={(e) => { e.stopPropagation(); onSelect(task.id); }}
                    >
                        <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-slate-300 bg-white group-hover:border-blue-400'}`}>
                            {isSelected && <Check size={14} className="text-white" />}
                        </div>
                    </div>

                    <div className="flex items-start gap-3 pr-8">
                        <div className={`p-2.5 rounded-xl ${platform.bg} ${platform.color} shrink-0`}>
                            <PlatformIcon size={20} />
                        </div>
                        
                        <div className="flex-1 min-w-0">
                            <div className="flex flex-wrap items-center gap-2 mb-1">
                                <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-md ${priorityInfo.color}`}>
                                    {priorityInfo.label}
                                </span>
                                {task.tags && task.tags.split(',').map((tag, i) => tag.trim() && (
                                    <span key={i} className="text-[10px] font-medium text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md truncate max-w-[80px]">
                                        #{tag.trim()}
                                    </span>
                                ))}
                            </div>
                            
                            <h3 className={`text-base font-semibold mb-1 line-clamp-2 ${task.status === 'done' ? 'text-slate-400 line-through' : 'text-slate-800'}`}>
                                {task.details || 'Untitled Task'}
                            </h3>
                            
                            <div className="flex flex-wrap items-center gap-3 text-xs text-slate-500 mt-3">
                                <div className="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">
                                    <div className={`w-2 h-2 rounded-full ${worker.color.split(' ')[0].replace('bg-', 'bg-').replace('-100', '-500')}`}></div>
                                    <span className="font-medium text-slate-700">{worker.name}</span>
                                </div>
                                
                                <div className={`flex items-center gap-1 font-medium ${overdue ? 'text-rose-600 bg-rose-50 px-2 py-1 rounded-lg' : ''}`}>
                                    <Calendar size={13} />
                                    <span>{formatDate(task.dueDate)}</span>
                                </div>
                                
                                {task.contentTypes?.length > 0 && (
                                    <div className="flex items-center gap-1 text-slate-400" title="Content Types">
                                        <FileText size={13} />
                                        <span>{task.contentTypes.length}</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    {/* Status Badge */}
                    <div className="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between">
                        <div className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium border ${statusInfo.color}`}>
                            <statusInfo.icon size={12} />
                            {statusInfo.label}
                        </div>
                        
                        <span className="text-[10px] text-slate-400">
                            ID: {task.id.slice(0, 5)}
                        </span>
                    </div>
                </div>
            );
        };

        // 3. Add/Edit Task Modal
        const AddTaskModal = ({ isOpen, onClose, onSave, editingTask, workerRef, isSaving }) => {
            const [formData, setFormData] = useState({
                platform: 'facebook',
                contentTypes: [],
                details: '',
                assignee: '',
                dueDate: '',
                status: 'todo',
                priority: 'medium',
                tags: '',
                links: ''
            });

            useEffect(() => {
                if (isOpen) {
                    if (editingTask) {
                        setFormData({
                            ...editingTask,
                            contentTypes: editingTask.contentTypes || [],
                            tags: editingTask.tags || '',
                            links: editingTask.links || ''
                        });
                    } else {
                        setFormData({
                            platform: 'facebook',
                            contentTypes: [],
                            details: '',
                            assignee: workerRef.current === 'all' ? '' : workerRef.current,
                            dueDate: new Date().toISOString().split('T')[0],
                            status: 'todo',
                            priority: 'medium',
                            tags: '',
                            links: ''
                        });
                    }
                }
            }, [isOpen, editingTask, workerRef]);

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
            };

            const toggleContentType = (id) => {
                setFormData(prev => {
                    const types = prev.contentTypes || [];
                    if (types.includes(id)) {
                        return { ...prev, contentTypes: types.filter(t => t !== id) };
                    } else {
                        return { ...prev, contentTypes: [...types, id] };
                    }
                });
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 animate-fadeIn">
                    <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col animate-slideUp">
                        
                        {/* Header */}
                        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-white shrink-0">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                {editingTask ? <Edit2 size={20} className="text-blue-500" /> : <Plus size={20} className="text-blue-500" />}
                                {editingTask ? 'Edit Task' : 'Create New Task'}
                            </h2>
                            <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                                <X size={20} />
                            </button>
                        </div>

                        {/* Form Body */}
                        <div className="p-6 overflow-y-auto hide-scrollbar flex-1 bg-slate-50/50">
                            <form id="task-form" onSubmit={handleSubmit} className="space-y-6">
                                
                                {/* Platform & Details Section */}
                                <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-5">
                                    {/* Platform */}
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-2">Platform</label>
                                        <div className="grid grid-cols-3 sm:grid-cols-6 gap-2">
                                            {Object.entries(PLATFORMS).map(([key, data]) => {
                                                const Icon = data.icon;
                                                const isSelected = formData.platform === key;
                                                return (
                                                    <button
                                                        key={key}
                                                        type="button"
                                                        onClick={() => setFormData({...formData, platform: key})}
                                                        className={`flex flex-col items-center justify-center p-3 rounded-xl border transition-all ${
                                                            isSelected 
                                                            ? `border-${data.color.split('-')[1]}-500 ${data.bg} shadow-sm ring-1 ring-${data.color.split('-')[1]}-500` 
                                                            : 'border-slate-200 hover:bg-slate-50 text-slate-500 bg-white'
                                                        }`}
                                                    >
                                                        <Icon size={20} className={isSelected ? data.color : 'text-slate-400'} />
                                                        <span className={`text-[10px] mt-1.5 font-medium ${isSelected ? data.color : ''}`}>{key.charAt(0).toUpperCase() + key.slice(1)}</span>
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>

                                    {/* Task Details */}
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Task Details <span className="text-rose-500">*</span></label>
                                        <textarea
                                            required
                                            value={formData.details}
                                            onChange={e => setFormData({...formData, details: e.target.value})}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm min-h-[100px] resize-none"
                                            placeholder="What needs to be done? e.g., Design banner for Summer Sale"
                                        />
                                    </div>

                                    {/* Content Types (Multi-select) */}
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-2">Content Format</label>
                                        <div className="flex flex-wrap gap-2">
                                            {CONTENT_TYPES.map(type => {
                                                const isSelected = (formData.contentTypes || []).includes(type.id);
                                                return (
                                                    <button
                                                        key={type.id}
                                                        type="button"
                                                        onClick={() => toggleContentType(type.id)}
                                                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors ${
                                                            isSelected
                                                            ? 'bg-blue-50 border-blue-200 text-blue-700'
                                                            : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'
                                                        }`}
                                                    >
                                                        <type.icon size={14} className={isSelected ? 'text-blue-500' : 'text-slate-400'} />
                                                        {type.label}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                </div>

                                {/* Assignment & Scheduling */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                                <Users size={16} className="text-slate-400" /> Assignee
                                            </label>
                                            <select
                                                value={formData.assignee}
                                                onChange={e => setFormData({...formData, assignee: e.target.value})}
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm appearance-none"
                                            >
                                                <option value="" disabled>Select Team Member</option>
                                                {WORKERS.map(w => (
                                                    <option key={w.name} value={w.name}>{w.name} - {w.role}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                                <Calendar size={16} className="text-slate-400" /> Due Date
                                            </label>
                                            <input
                                                type="date"
                                                value={formData.dueDate}
                                                onChange={e => setFormData({...formData, dueDate: e.target.value})}
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm"
                                            />
                                        </div>
                                    </div>

                                    <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-4">
                                        <div>

                        // For this app, if they have a real uid, we treat them as editor.

                                    <button 
                                        onClick={() => setFilterAssignee('all')}
                                        className={`w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm transition-colors ${filterAssignee === 'all' ? 'bg-blue-600/10 text-blue-400 font-medium' : 'hover:bg-slate-800'}`}
                                    >
                                        <span className="flex items-center gap-2"><Users size={16}/> All Members</span>
                                        <span className="bg-slate-800 px-1.5 py-0.5 rounded text-xs">{tasks.length}</span>
                                    </button>
                                    
                                    {WORKERS.map(w => {
                                        const count = tasks.filter(t => t.assignee === w.name).length;
                                        return (
                                            <button 
                                                key={w.name}
                                                onClick={() => setFilterAssignee(w.name)}
                                                className={`w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm transition-colors ${filterAssignee === w.name ? 'bg-blue-600/10 text-blue-400 font-medium' : 'hover:bg-slate-800'}`}
                                            >
                                                <span className="flex items-center gap-2">
                                                    <div className={`w-2 h-2 rounded-full ${w.color.split(' ')[0].replace('bg-', 'bg-').replace('-100', '-500')}`}></div>
                                                    {w.name}
                                                </span>
                                                {count > 0 && <span className="bg-slate-800 px-1.5 py-0.5 rounded text-xs">{count}</span>}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>

                            <div>
                                <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 px-1">Status</h3>
                                <div className="space-y-1">
                                     <button 
                                        onClick={() => setFilterStatus('all')}
                                        className={`w-full flex items-center px-3 py-2 rounded-lg text-sm transition-colors ${filterStatus === 'all' ? 'bg-blue-600/10 text-blue-400 font-medium' : 'hover:bg-slate-800'}`}
                                    >
                                        <History size={16} className="mr-2 opacity-70"/> All Statuses
                                    </button>
                                    {Object.entries(STATUSES).map(([key, data]) => (
                                        <button 
                                            key={key}
                                            onClick={() => setFilterStatus(key)}
                                            className={`w-full flex items-center px-3 py-2 rounded-lg text-sm transition-colors ${filterStatus === key ? 'bg-blue-600/10 text-blue-400 font-medium' : 'hover:bg-slate-800'}`}
                                        >
                                            <data.icon size={16} className={`mr-2 ${data.color.split(' ')[1]}`}/> {data.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Mobile Add Button - Floating */}
                        <button 
                            onClick={() => { setEditingTask(null); setAddModalOpen(true); }}
                            className="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-500/30 flex items-center justify-center z-50 hover:bg-blue-700 active:scale-95 transition-all"
                        >
                            <Plus size={24} />
                        </button>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 bg-slate-50 min-w-0 flex flex-col h-screen overflow-hidden">
                        
                        {/* Top Bar (Search & Actions) */}
                        <div className="bg-white px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0 z-20 shadow-sm shadow-slate-100/50">
                            <div className="flex-1 max-w-md relative">
                                <Search size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text" 
                                    placeholder="Search tasks, tags..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2 bg-slate-100 border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-xl text-sm transition-all outline-none"
                                />
                                {searchQuery && (
                                    <button onClick={() => setSearchQuery('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <X size={14}/>
                                    </button>
                                )}
                            </div>
                            
                            <div className="flex items-center gap-3 ml-4">
                                <div className="bg-slate-100 p-1 rounded-xl flex">
                                    <button onClick={() => setViewMode('list')} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${viewMode === 'list' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>List</button>
                                    <button onClick={() => setViewMode('kanban')} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${viewMode === 'kanban' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>Board</button>
                                </div>
                                
                                <button 
                                    onClick={() => { setEditingTask(null); setAddModalOpen(true); }}
                                    className="hidden md:flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-sm shadow-blue-500/20"
                                >
                                    <Plus size={16} /> New Task
                                </button>
                            </div>
                        </div>

                        {/* Mobile Filters Scroll */}
                        <div className="md:hidden bg-white px-4 py-2 border-b border-slate-200 flex gap-2 overflow-x-auto hide-scrollbar shrink-0">
                            <button 
                                onClick={() => setFilterAssignee('all')}
                                className={`whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium border ${filterAssignee === 'all' ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200'}`}
                            >All Members</button>
                            {WORKERS.map(w => (
                                <button 
                                    key={w.name}
                                    onClick={() => setFilterAssignee(w.name)}
                                    className={`whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium border ${filterAssignee === w.name ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200'}`}
                                >{w.name}</button>
                            ))}
                        </div>

                        {/* Main Canvas */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-6 pb-24 relative">
                            <div className="max-w-7xl mx-auto">
                                
                                {error && (
                                    <div className="mb-6 p-4 bg-rose-50 border border-rose-200 text-rose-700 rounded-xl flex items-center gap-3">
                                        <AlertTriangle size={20} className="shrink-0"/>
                                        <p className="text-sm">{error}</p>
                                    </div>
                                )}

                                {/* Only show stats in List mode or if forced */}
                                {viewMode === 'list' && <DashboardStats tasks={tasks} />}

                                {/* List View */}
                                {viewMode === 'list' && (
                                    <div className="space-y-6">
                                        {/* Status Groups */}
                                        {Object.entries(STATUSES).map(([statusKey, statusInfo]) => {
                                            const groupTasks = filteredTasks.filter(t => t.status === statusKey);
                                            // Hide empty groups if filtering heavily, or keep them for structure
                                            if (groupTasks.length === 0 && (filterAssignee !== 'all' || searchQuery)) return null;

                                            return (
                                                <div key={statusKey} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                                    <div className={`px-5 py-3 border-b flex items-center justify-between bg-slate-50/50`}>
                                                        <div className="flex items-center gap-2">
                                                            <div className={`p-1.5 rounded-lg ${statusInfo.color.replace('border-', 'border-0 bg-opacity-20 ')} bg-white shadow-sm`}>
                                                                <statusInfo.icon size={16} />
                                                            </div>
                                                            <h3 className="font-semibold text-slate-700">{statusInfo.label}</h3>
                                                            <span className="bg-white border border-slate-200 text-slate-500 text-xs px-2 py-0.5 rounded-full ml-2">
                                                                {groupTasks.length}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 bg-slate-50/30">
                                                        {loading ? (
                                                            [1,2,3].map(i => <div key={i} className="h-32 rounded-2xl shimmer bg-white border border-slate-100"></div>)
                                                        ) : groupTasks.length > 0 ? (
                                                            groupTasks.map(task => (
                                                                <TaskCard 
                                                                    key={task.id} 
                                                                    task={task} 
                                                                    onClick={() => { setActiveTask(task); setDetailModalOpen(true); }}
                                                                    onSelect={handleToggleSelect}
                                                                    isSelected={selectedTasks.has(task.id)}
                                                                />
                                                            ))
                                                        ) : (
                                                            <div className="col-span-full py-8 text-center text-slate-400 text-sm">
                                                                No tasks in this status
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                                {/* Kanban Board View */}
                                {viewMode === 'kanban' && (
                                    <div className="flex gap-6 overflow-x-auto pb-4 hide-scrollbar min-h-[60vh] snap-x snap-mandatory">
                                        {Object.entries(STATUSES).map(([statusKey, statusInfo]) => {
                                            const groupTasks = filteredTasks.filter(t => t.status === statusKey);
                                            return (
                                                <div key={statusKey} className="w-80 shrink-0 flex flex-col snap-center">
                                                    <div className="flex items-center justify-between mb-4 px-1">
                                                        <div className="flex items-center gap-2">
                                                            <statusInfo.icon size={16} className={statusInfo.color.split(' ')[1]} />
                                                            <h3 className="font-semibold text-slate-700">{statusInfo.label}</h3>
                                                        </div>
                                                        <span className="bg-slate-200 text-slate-600 text-xs px-2 py-1 rounded-full font-medium">
                                                            {groupTasks.length}
                                                        </span>
                                                    </div>
                                                    
                                                    <div className="bg-slate-100/50 rounded-2xl p-3 flex-1 overflow-y-auto space-y-3 min-h-[200px] border border-slate-200 border-dashed">
                                                        {groupTasks.map(task => (
                                                            <TaskCard 
                                                                key={task.id} 
                                                                task={task} 
                                                                onClick={() => { setActiveTask(task); setDetailModalOpen(true); }}
                                                                onSelect={handleToggleSelect}
                                                                isSelected={selectedTasks.has(task.id)}
                                                            />
                                                        ))}
                                                        {groupTasks.length === 0 && (
                                                            <div className="h-24 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center text-slate-400 text-sm">
                                                                Drop here
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                            </div>
                        </div>
                    </div>

                    {/* Bulk Actions Bar */}
                    {selectedTasks.size > 0 && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-4 z-40 animate-slideUp">
                            <span className="font-bold text-sm">{selectedTasks.size} selected</span>
                            <div className="h-4 w-px bg-slate-700"></div>
                            <button 
                                onClick={() => handleBulkAction('done')}
                                className="text-emerald-400 hover:text-emerald-300 font-medium text-sm flex items-center gap-1"
                            >
                                <CheckCircle2 size={16}/> Mark Done
                            </button>
                            <button 
                                onClick={() => handleBulkAction('delete')}
                                className="text-rose-400 hover:text-rose-300 font-medium text-sm flex items-center gap-1"
                            >
                                <Trash2 size={16}/> Delete
                            </button>
                            <button onClick={() => setSelectedTasks(new Set())} className="ml-2 text-slate-400 hover:text-white">
                                <X size={16}/>
                            </button>
                        </div>
                    )}

                    {/* Modals */}
                    <ConfirmModal 
                        isOpen={confirmModal.isOpen} 
                        title={confirmModal.title} 
                        message={confirmModal.message} 
                        onConfirm={confirmModal.onConfirm} 
                        onCancel={() => setConfirmModal(prev => ({ ...prev, isOpen: false }))} 
                        loading={actionLoading} 
                    />
                    
                    <AddTaskModal 
                        isOpen={isAddModalOpen} 
                        onClose={() => setAddModalOpen(false)} 
                        onSave={handleSaveTask} 
                        editingTask={editingTask}
                        workerRef={workerRef}
                        isSaving={actionLoading}
                    />

                    <TaskDetailModal 
                        task={activeTask} 
                        onClose={() => { setActiveTask(null); setDetailModalOpen(false); }} 
                        onEdit={(task) => { setDetailModalOpen(false); setEditingTask(task); setAddModalOpen(true); }}
                    />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
