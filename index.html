<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Production Planner & Design Hub 2026</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Fusemxd/task.fuse.hyg/37e17d0f0f712995e6e21546cba558911aecb74a/3.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Anuphan:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Anuphan', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInAnonymously, 
            onAuthStateChanged 
        } from 'firebase/auth';
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            onSnapshot, 
            serverTimestamp,
            doc,
            deleteDoc
        } from 'firebase/firestore';
        import { 
            LayoutDashboard, 
            Calendar as CalendarIcon, 
            CheckSquare, 
            Plus, 
            MoreVertical, 
            Search, 
            Bell, 
            User, 
            ChevronRight,
            Clock,
            AlertCircle,
            FileText,
            Trash2,
            Copy,
            Image as ImageIcon,
            QrCode,
            Phone,
            CheckCircle2,
            Palette,
            ExternalLink,
            Download
        } from 'lucide-react';

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBdmGg7vi9QAD04VFM9suKvjoId_HO7s18",
            authDomain: "fusetaskhyg.firebaseapp.com",
            projectId: "fusetaskhyg",
            storageBucket: "fusetaskhyg.firebasestorage.app",
            messagingSenderId: "667329598644",
            appId: "1:667329598644:web:79abb5f6a20739d14f73e1",
            measurementId: "G-EB845SQBW1"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'production-planner-2026';

        // --- Components ---

        const SidebarItem = ({ icon: Icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${
                    active 
                    ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' 
                    : 'text-slate-500 hover:bg-slate-100 hover:text-slate-900'
                }`}
            >
                <Icon size={20} />
                <span className="font-medium text-sm">{label}</span>
            </button>
        );

        // --- Design Hub Module ---
        const DesignHub = ({ user }) => {
            const [view, setView] = useState('list');
            const [requests, setRequests] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [form, setForm] = useState({
                nameTH: '', nameEN: '',
                posTH: '', posEN: '',
                phone: '',
                imgProfile: '',
                imgQR: ''
            });

            useEffect(() => {
                if (!user) return;
                
                // แหล่งข้อมูลที่ 1: ที่จัดเก็บใหม่ตามกฎ Rule 1
                const newQ = collection(db, 'artifacts', appId, 'public', 'data', 'design_requests');
                // แหล่งข้อมูลที่ 2: ที่จัดเก็บเดิม (Root Collection)
                const oldQ = collection(db, 'design_requests');

                let newData = [];
                let oldData = [];

                const updateState = () => {
                    const combined = [...newData, ...oldData].sort((a, b) => {
                        const timeA = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt?.seconds ? a.createdAt.seconds * 1000 : Date.now());
                        const timeB = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt?.seconds ? b.createdAt.seconds * 1000 : Date.now());
                        return timeB - timeA;
                    });
                    setRequests(combined);
                };

                // ฟังข้อมูลจากที่เก็บใหม่
                const unsubscribeNew = onSnapshot(newQ, (snapshot) => {
                    newData = snapshot.docs.map(doc => ({ id: doc.id, isNewPath: true, ...doc.data() }));
                    updateState();
                }, (err) => console.error("New Path Error:", err));

                // ฟังข้อมูลจากที่เก็บเดิม
                const unsubscribeOld = onSnapshot(oldQ, (snapshot) => {
                    oldData = snapshot.docs.map(doc => ({ id: doc.id, isNewPath: false, ...doc.data() }));
                    updateState();
                }, (err) => {
                    console.warn("Old Path (Root) may be restricted or empty:", err);
                });

                return () => {
                    unsubscribeNew();
                    unsubscribeOld();
                };
            }, [user]);

            const handleFileUpload = (e, field) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 500000) {
                    alert("ไฟล์ใหญ่เกินไป กรุณาใช้ไฟล์ที่ต่ำกว่า 500KB");
                    return;
                }
                const reader = new FileReader();
                reader.onloadend = () => {
                    setForm(prev => ({ ...prev, [field]: reader.result }));
                };
                reader.readAsDataURL(file);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                setIsSubmitting(true);
                setErrorMsg('');
                try {
                    // การบันทึกใหม่จะใช้ Path ใหม่เสมอเพื่อความเป็นระเบียบ
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'design_requests'), {
                        ...form,
                        createdBy: user.uid,
                        createdAt: serverTimestamp()
                    });
                    setForm({ nameTH: '', nameEN: '', posTH: '', posEN: '', phone: '', imgProfile: '', imgQR: '' });
                    setView('list');
                } catch (err) {
                    console.error(err);
                    setErrorMsg("บันทึกไม่สำเร็จ: " + err.message);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error('Copy error:', err);
                }
                document.body.removeChild(textArea);
            };

            const handleDelete = async (id, isNewPath) => {
                if(window.confirm("คุณต้องการลบข้อมูลนี้ใช่หรือไม่?")) {
                    try {
                        // เลือกลบจาก Path ที่ข้อมูลนั้นอยู่
                        const docRef = isNewPath 
                            ? doc(db, 'artifacts', appId, 'public', 'data', 'design_requests', id)
                            : doc(db, 'design_requests', id);
                        await deleteDoc(docRef);
                    } catch (err) {
                        alert("ลบไม่สำเร็จ: " + err.message);
                    }
                }
            };

            return (
                <div className="animate-fade">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-900">Design Hub</h1>
                            <p className="text-slate-500 text-sm">จัดการข้อมูลงานออกแบบนามบัตรและสื่อสิ่งพิมพ์</p>
                        </div>
                        <button 
                            onClick={() => setView(view === 'list' ? 'form' : 'list')}
                            className="flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-xl hover:bg-blue-700 transition-all font-medium shadow-lg shadow-blue-100"
                        >
                            {view === 'list' ? <Plus size={18} /> : <FileText size={18} />}
                            {view === 'list' ? 'ส่งคำขอข้อมูลใหม่' : 'ดูรายการข้อมูล'}
                        </button>
                    </div>

                    {errorMsg && (
                        <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4">
                            {errorMsg}
                        </div>
                    )}

                    {view === 'form' ? (
                        <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                                <h2 className="font-semibold text-lg flex items-center gap-2">
                                    <Palette size={20} className="text-blue-600" />
                                    กรอกข้อมูลพนักงาน
                                </h2>
                            </div>
                            <form onSubmit={handleSubmit} className="p-8 space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-sm font-semibold text-slate-700">ชื่อ-นามสกุล (TH) <span className="text-red-500">*</span></label>
                                        <input required value={form.nameTH} onChange={e => setForm({...form, nameTH: e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-semibold text-slate-700">Name-Surname (EN) <span className="text-red-500">*</span></label>
                                        <input required value={form.nameEN} onChange={e => setForm({...form, nameEN: e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-semibold text-slate-700">ตำแหน่ง (TH) <span className="text-red-500">*</span></label>
                                        <input required value={form.posTH} onChange={e => setForm({...form, posTH: e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-semibold text-slate-700">Position (EN) <span className="text-red-500">*</span></label>
                                        <input required value={form.posEN} onChange={e => setForm({...form, posEN: e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
                                    </div>
                                    <div className="space-y-2 md:col-span-2">
                                        <label className="text-sm font-semibold text-slate-700">เบอร์โทรศัพท์ <span className="text-red-500">*</span></label>
                                        <div className="relative">
                                            <Phone size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                            <input required type="tel" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} className="w-full pl-11 pr-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
                                    <div className="space-y-4">
                                        <label className="text-sm font-semibold text-slate-700">1. รูปพนักงาน (ครึ่งตัว/หน้าตรง)</label>
                                        <div className="border-2 border-dashed border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center gap-3 bg-slate-50">
                                            {form.imgProfile ? <img src={form.imgProfile} className="h-32 w-32 object-cover rounded-full shadow-md" alt="profile" /> : <ImageIcon size={32} className="text-slate-300" />}
                                            <input type="file" accept="image/*" onChange={e => handleFileUpload(e, 'imgProfile')} className="text-xs" />
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-sm font-semibold text-slate-700">2. QR Code Line</label>
                                        <div className="border-2 border-dashed border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center gap-3 bg-slate-50">
                                            {form.imgQR ? <img src={form.imgQR} className="h-32 w-32 object-contain rounded-lg shadow-md" alt="qrcode" /> : <QrCode size={32} className="text-slate-300" />}
                                            <input type="file" accept="image/*" onChange={e => handleFileUpload(e, 'imgQR')} className="text-xs" />
                                        </div>
                                    </div>
                                </div>

                                <button disabled={isSubmitting} type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg disabled:opacity-50">
                                    {isSubmitting ? 'กำลังบันทึก...' : 'บันทึกข้อมูลและส่งให้กราฟิก'}
                                </button>
                            </form>
                        </div>
                    ) : (
                        <div className="space-y-4">
                            {requests.length === 0 ? (
                                <div className="bg-white rounded-2xl p-12 text-center border border-slate-200">
                                    <div className="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Palette size={24} className="text-slate-400" />
                                    </div>
                                    <h3 className="font-bold text-slate-900 mb-2">ไม่พบข้อมูล</h3>
                                    <p className="text-slate-500">กำลังดึงข้อมูลจากทั้งที่เก็บเดิมและที่เก็บใหม่...</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 gap-6">
                                    {requests.map(req => (
                                        <div key={req.id} className={`bg-white rounded-2xl border ${req.isNewPath ? 'border-slate-200' : 'border-amber-200 bg-amber-50/20'} shadow-sm overflow-hidden flex flex-col md:flex-row transition-all`}>
                                            <div className="p-6 bg-slate-50 border-r border-slate-100 flex flex-col items-center gap-4 w-full md:w-64">
                                                <img src={req.imgProfile || 'https://via.placeholder.com/150'} className="w-24 h-24 rounded-full border-4 border-white shadow-md object-cover" alt="p" />
                                                <img src={req.imgQR || 'https://via.placeholder.com/150'} className="w-20 h-20 rounded-lg border-4 border-white shadow-sm object-contain" alt="q" />
                                            </div>
                                            <div className="flex-1 p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="col-span-2 flex justify-between items-center">
                                                    <div className="flex gap-2">
                                                        <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full uppercase">Entry</span>
                                                        {!req.isNewPath && <span className="text-[10px] font-bold text-amber-600 bg-amber-100 px-2 py-1 rounded-full uppercase">Legacy Data</span>}
                                                    </div>
                                                    <button onClick={() => handleDelete(req.id, req.isNewPath)} className="text-slate-300 hover:text-red-500 transition-colors"><Trash2 size={16} /></button>
                                                </div>
                                                {[
                                                    { label: 'Name (TH)', value: req.nameTH },
                                                    { label: 'Name (EN)', value: req.nameEN },
                                                    { label: 'Pos (TH)', value: req.posTH },
                                                    { label: 'Pos (EN)', value: req.posEN },
                                                    { label: 'Phone', value: req.phone }
                                                ].map((f, i) => (
                                                    <div key={i} className="bg-slate-50 p-2 rounded-lg border border-slate-100 group">
                                                        <div className="flex justify-between items-center text-[10px] text-slate-400 font-bold mb-1">
                                                            {f.label}
                                                            <button onClick={() => copyToClipboard(f.value)} className="opacity-0 group-hover:opacity-100 text-blue-500"><Copy size={12} /></button>
                                                        </div>
                                                        <p className="text-sm font-medium text-slate-800">{f.value || '-'}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('design');
            const [user, setUser] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) { console.error(err); }
                };
                initAuth();
                return onAuthStateChanged(auth, (u) => setUser(u));
            }, []);

            return (
                <div className="flex min-h-screen">
                    <div className="w-64 bg-white border-r border-slate-200 p-6 flex flex-col gap-8 hidden lg:flex fixed h-full z-30">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">P</div>
                            <div>
                                <h2 className="font-bold text-slate-900 leading-tight">Planner</h2>
                                <p className="text-[10px] text-slate-500">VER 2026.1</p>
                            </div>
                        </div>
                        <div className="space-y-2">
                            <SidebarItem icon={LayoutDashboard} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <SidebarItem icon={Palette} label="Design Hub" active={activeTab === 'design'} onClick={() => setActiveTab('design')} />
                        </div>
                    </div>

                    <div className="flex-1 lg:ml-64 min-w-0">
                        <header className="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-20">
                            <h2 className="font-bold text-slate-800">Production Hub</h2>
                            <div className="flex items-center gap-3">
                                <div className="text-right">
                                    <p className="text-xs font-bold text-slate-900 leading-none">{user?.uid ? 'Signed In' : 'Signing In...'}</p>
                                    <p className="text-[10px] text-emerald-500">System Online</p>
                                </div>
                                <div className="w-9 h-9 bg-blue-100 text-blue-700 rounded-xl flex items-center justify-center font-bold">AD</div>
                            </div>
                        </header>
                        <main className="p-4 md:p-8 max-w-6xl mx-auto">
                            {activeTab === 'design' ? <DesignHub user={user} /> : (
                                <div className="p-12 text-center text-slate-400 italic">หน้า Dashboard กำลังปรับปรุง...</div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
